<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABYSS INVADERS - YELLOW SUBMARINE EDITION</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            border: 2px solid #00ffcc;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-container"></div>

    <script>
        // --- CENA DE BOOT ---
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                // Carregando as suas criaturas da pasta assets
                // O caminho deve ser relativo ao arquivo HTML
                this.creatureKeys = [];
                for (let i = 1; i <= 6; i++) {
                    const key = `creature${i}`;
                    this.load.image(key, `assets/abyssal_creatures_sprites/Creature_${i}.png`);
                    this.creatureKeys.push(key);
                }

                // Mantemos o carregamento/geração do submarino e tiros
                this.generateBaseAssets();
            }
            create() {
                this.generateBaseAssets();
                this.scene.start('MainMenu');
            }

            generateBaseAssets() {
                if (this.textures.exists('player')) return;
                const g = this.add.graphics();

                // Coração
                g.clear();
                g.fillStyle(0xff3366, 1);

                // parte esquerda
                g.fillCircle(8, 8, 6);

                // parte direita
                g.fillCircle(16, 8, 6);

                // ponta inferior
                g.fillTriangle(2, 10, 22, 10, 12, 22);

                g.generateTexture('heart', 24, 24);

                // Bolhas
                g.clear();
                g.lineStyle(2, 0xaaffff, 0.9);
                g.strokeCircle(8, 8, 6);
                g.generateTexture('bgBubble', 16, 16);

                // Corals
                g.clear();
                g.fillStyle(0xff7a7a, 1);
                g.fillRoundedRect(8, 18, 10, 26, 5);
                g.fillRoundedRect(18, 8, 10, 36, 5);
                g.fillRoundedRect(28, 15, 10, 29, 5);
                g.generateTexture('coralPink', 46, 46);

                g.clear();
                g.fillStyle(0x7dffb3, 1);
                g.fillRoundedRect(6, 10, 6, 34, 3);
                g.fillRoundedRect(16, 3, 6, 41, 3);
                g.fillRoundedRect(26, 12, 6, 32, 3);
                g.fillRoundedRect(36, 7, 6, 37, 3);
                g.generateTexture('seaweed', 48, 48);

                // NOVO: SUBMARINO AMARELO (Referência Beatles)
                g.clear();
                // Corpo principal
                g.fillStyle(0xffff00, 1);
                g.fillRoundedRect(5, 10, 30, 15, 8);
                // Torre (Periscópio)
                g.fillRect(18, 2, 4, 10);
                g.fillRect(20, 2, 6, 3);
                // Janelas (Escotilhas)
                g.fillStyle(0x003366, 1);
                g.fillCircle(12, 17, 2.5);
                g.fillCircle(20, 17, 2.5);
                g.fillCircle(28, 17, 2.5);
                // Hélice
                g.fillStyle(0xff9900, 1);
                g.fillRect(0, 14, 5, 7);
                g.generateTexture('player', 40, 30);

                // Aliens (Estética Original Mantida)
                g.clear().fillStyle(0xff00ff, 1).fillCircle(15, 10, 15).fillRect(5, 10, 20, 15).generateTexture('alienA', 30, 30);
                g.clear().fillStyle(0x00ff00, 1).fillTriangle(15, 0, 0, 15, 30, 15).fillRect(0, 15, 30, 10).generateTexture('alienB', 30, 30);
                g.clear().fillStyle(0xff3366, 1).fillRect(0, 5, 30, 15).fillCircle(15, 5, 10).generateTexture('alienC', 30, 30);

                // Efeitos e Projéteis
                g.clear().lineStyle(2, 0x00ffcc).strokeCircle(6, 6, 5).generateTexture('bubble', 12, 12);
                g.clear().fillStyle(0xff00ff).fillTriangle(4, 0, 0, 12, 8, 12).generateTexture('enemy_shot', 8, 12);
                g.clear().fillStyle(0x00cc66).fillRoundedRect(0, 0, 60, 40, 10).generateTexture('coral', 60, 40);
                g.clear().fillStyle(0xffffff).fillCircle(2, 2, 2).generateTexture('particle', 4, 4);

                g.destroy();
            }
        }

        class MainMenu extends Phaser.Scene {
            constructor() { super('MainMenu'); }
            create() {
                this.add.text(400, 250, 'ABYSS INVADERS', { fontSize: '60px', fill: '#00ffcc', fontStyle: 'bold' }).setOrigin(0.5);
                const t = this.add.text(400, 450, '[ ESPAÇO OU CLIQUE PARA MERGULHAR ]', { fontSize: '20px', fill: '#ffffff' }).setOrigin(0.5);
                this.tweens.add({ targets: t, alpha: 0, duration: 800, yoyo: true, repeat: -1 });

                const start = () => { if (!this.started) { this.started = true; this.scene.start('GameScene'); } };
                this.input.keyboard.once('keydown-SPACE', start);
                this.input.once('pointerdown', start);
            }
        }

        // --- GAMEPLAY (Correção do Erro de Sequência) ---
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            init() {
                this.score = 0; this.lives = 3; this.wave = 1;
            }


            createHeartsUI() {
                this.hearts.forEach(h => h.destroy());
                this.hearts = [];

                for (let i = 0; i < this.lives; i++) {
                    const heart = this.add.image(740 - (i * 30), 30, 'heart')
                        .setScale(0.9)
                        .setDepth(10);

                    this.hearts.push(heart);
                }
            }


            create() {
                //Cores e Fundo
                this.bgDecor = this.add.group();
                this.midDecor = this.add.group();
                this.floorDecor = this.add.group();
                this.frontDecor = this.add.group();

                // 1. INICIALIZAR GRUPOS PRIMEIRO
                this.playerBullets = this.physics.add.group();
                this.enemyBullets = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.barriers = this.physics.add.group();

                // 2. INICIALIZAR TIMER ANTES DO SPAWNWAVE
                this.enemyFireTimer = this.time.addEvent({
                    delay: 1000, callback: this.enemyFire, callbackScope: this, loop: true
                });

                // 3. CRIAÇÃO DO JOGADOR
                this.player = this.physics.add.sprite(400, 520, 'player').setCollideWorldBounds(true);
                this.explosionEmitter = this.add.particles('particle').createEmitter({
                    speed: { min: 50, max: 150 }, scale: { start: 1, end: 0 }, lifespan: 600, blendMode: 'ADD', on: false
                });


                // 4. CONSTRUIR O CENÁRIO (spawnWave agora encontrará o timer definido no passo 2)
                this.createOceanAmbience();
                this.createBarriers();
                this.spawnWave();


                // 5. INTERFACE
                this.scoreText = this.add.text(20, 20, 'SCORE: 0', { fontSize: '20px', fill: '#00ffcc' });
                this.hearts = [];
                this.createHeartsUI();
                this.cursors = this.input.keyboard.createCursorKeys();
                this.fireKey = this.input.keyboard.addKey('SPACE');
                this.lastFired = 0;

                // 6. COLISÕES
                this.physics.add.overlap(this.playerBullets, this.enemies, this.hitEnemy, null, this);
                this.physics.add.overlap(this.enemyBullets, this.player, this.hitPlayer, null, this);
                this.physics.add.overlap([this.playerBullets, this.enemyBullets], this.barriers, this.hitBarrier, null, this);
            }

            createBarriers() {
                for (let i = 0; i < 4; i++) {
                    let b = this.barriers.create(130 + (i * 180), 430, 'coral').setImmovable(true);
                    b.health = 5;
                }
            }
            drawHillChain(graphics, offsetX, baseY, hills) {
                graphics.beginPath();
                graphics.moveTo(-100 + offsetX, 600);

                for (const hill of hills) {
                    const left = hill.x + offsetX;
                    const peakX = left + hill.w * 0.5;
                    const right = left + hill.w;
                    const peakY = baseY - hill.h;

                    graphics.lineTo(left, baseY);
                    graphics.lineTo(peakX, peakY);
                    graphics.lineTo(right, baseY);
                }

                graphics.lineTo(900 + offsetX, 600);
                graphics.closePath();
                graphics.fillPath();
            }

            drawSeaweedSilhouettes(graphics, color, items) {
                graphics.fillStyle(color, 1);

                items.forEach(item => {
                    const x = item.x;
                    const y = item.y;
                    const s = item.s;

                    graphics.fillRect(x - 4 * s, y - 34 * s, 8 * s, 34 * s);
                    graphics.fillRect(x - 18 * s, y - 22 * s, 8 * s, 24 * s);
                    graphics.fillRect(x + 10 * s, y - 26 * s, 8 * s, 26 * s);

                    graphics.fillTriangle(
                        x - 14 * s, y - 10 * s,
                        x - 2 * s, y - 44 * s,
                        x + 2 * s, y - 10 * s
                    );

                    graphics.fillTriangle(
                        x + 14 * s, y - 12 * s,
                        x + 26 * s, y - 40 * s,
                        x + 18 * s, y - 10 * s
                    );
                });
            }
            updateParallaxBackground() {
                this.parallaxFarX -= 0.08;
                this.parallaxMidX -= 0.18;
                this.parallaxNearX -= 0.35;

                // redesenha camada distante
                this.bgFar.clear();
                this.bgFar.fillStyle(0x17389f, 1);
                this.drawHillChain(this.bgFar, this.parallaxFarX % 800, 470, [
                    { x: 0, w: 140, h: 80 },
                    { x: 90, w: 180, h: 150 },
                    { x: 250, w: 160, h: 90 },
                    { x: 390, w: 170, h: 120 },
                    { x: 520, w: 210, h: 170 },
                    { x: 700, w: 140, h: 85 },

                    { x: 800, w: 140, h: 80 },
                    { x: 890, w: 180, h: 150 },
                    { x: 1050, w: 160, h: 90 },
                    { x: 1190, w: 170, h: 120 },
                    { x: 1320, w: 210, h: 170 },
                    { x: 1500, w: 140, h: 85 }
                ]);
                this.drawSeaweedSilhouettes(this.bgFar, 0x17389f, [
                    { x: (120 + this.parallaxFarX * 0.6) % 900, y: 455, s: 0.9 },
                    { x: (430 + this.parallaxFarX * 0.6) % 900, y: 445, s: 0.8 },
                    { x: (660 + this.parallaxFarX * 0.6) % 900, y: 440, s: 1.0 }
                ]);

                // camada média
                this.bgMid.clear();
                this.bgMid.fillStyle(0x0f2d87, 1);
                this.drawHillChain(this.bgMid, this.parallaxMidX % 800, 520, [
                    { x: -30, w: 180, h: 140 },
                    { x: 120, w: 150, h: 95 },
                    { x: 250, w: 200, h: 170 },
                    { x: 430, w: 170, h: 110 },
                    { x: 560, w: 220, h: 155 },
                    { x: 740, w: 150, h: 100 },

                    { x: 770, w: 180, h: 140 },
                    { x: 920, w: 150, h: 95 },
                    { x: 1050, w: 200, h: 170 },
                    { x: 1230, w: 170, h: 110 },
                    { x: 1360, w: 220, h: 155 },
                    { x: 1540, w: 150, h: 100 }
                ]);
                this.drawSeaweedSilhouettes(this.bgMid, 0x0f2d87, [
                    { x: (60 + this.parallaxMidX * 0.8) % 920, y: 500, s: 1.2 },
                    { x: (210 + this.parallaxMidX * 0.8) % 920, y: 510, s: 1.0 },
                    { x: (470 + this.parallaxMidX * 0.8) % 920, y: 500, s: 1.3 }
                ]);

                // camada próxima
                this.bgNear.clear();
                this.bgNear.fillStyle(0x021a63, 1);
                this.drawHillChain(this.bgNear, this.parallaxNearX % 800, 565, [
                    { x: -40, w: 150, h: 120 },
                    { x: 70, w: 170, h: 70 },
                    { x: 210, w: 130, h: 120 },
                    { x: 300, w: 180, h: 85 },
                    { x: 450, w: 220, h: 150 },
                    { x: 650, w: 180, h: 95 },

                    { x: 760, w: 150, h: 120 },
                    { x: 870, w: 170, h: 70 },
                    { x: 1010, w: 130, h: 120 },
                    { x: 1100, w: 180, h: 85 },
                    { x: 1250, w: 220, h: 150 },
                    { x: 1450, w: 180, h: 95 }
                ]);
                this.drawSeaweedSilhouettes(this.bgNear, 0x021a63, [
                    { x: (25 + this.parallaxNearX) % 950, y: 545, s: 1.4 },
                    { x: (140 + this.parallaxNearX) % 950, y: 555, s: 1.3 },
                    { x: (330 + this.parallaxNearX) % 950, y: 550, s: 1.2 },
                    { x: (590 + this.parallaxNearX) % 950, y: 548, s: 1.5 },
                    { x: (745 + this.parallaxNearX) % 950, y: 555, s: 1.1 }
                ]);
            }

            // Funções Auxiliares para o Parallax
            createParallaxBackground() {
                // CAMADA 1 — distante
                this.bgFar = this.add.graphics().setDepth(-25);
                this.bgFar.fillStyle(0x17389f, 1);

                this.drawHillChain(this.bgFar, 0, 470, [
                    { x: 0, w: 140, h: 80 },
                    { x: 90, w: 180, h: 150 },
                    { x: 250, w: 160, h: 90 },
                    { x: 390, w: 170, h: 120 },
                    { x: 520, w: 210, h: 170 },
                    { x: 700, w: 140, h: 85 }
                ]);

                this.drawSeaweedSilhouettes(this.bgFar, 0x17389f, [
                    { x: 120, y: 455, s: 0.9 },
                    { x: 430, y: 445, s: 0.8 },
                    { x: 660, y: 440, s: 1.0 }
                ]);

                // CAMADA 2 — intermediária
                this.bgMid = this.add.graphics().setDepth(-18);
                this.bgMid.fillStyle(0x0f2d87, 1);

                this.drawHillChain(this.bgMid, 0, 520, [
                    { x: -30, w: 180, h: 140 },
                    { x: 120, w: 150, h: 95 },
                    { x: 250, w: 200, h: 170 },
                    { x: 430, w: 170, h: 110 },
                    { x: 560, w: 220, h: 155 },
                    { x: 740, w: 150, h: 100 }
                ]);

                this.drawSeaweedSilhouettes(this.bgMid, 0x0f2d87, [
                    { x: 60, y: 500, s: 1.2 },
                    { x: 210, y: 510, s: 1.0 },
                    { x: 470, y: 500, s: 1.3 }
                ]);

                // CAMADA 3 — próxima
                this.bgNear = this.add.graphics().setDepth(-8);
                this.bgNear.fillStyle(0x021a63, 1);

                this.drawHillChain(this.bgNear, 0, 565, [
                    { x: -40, w: 150, h: 120 },
                    { x: 70, w: 170, h: 70 },
                    { x: 210, w: 130, h: 120 },
                    { x: 300, w: 180, h: 85 },
                    { x: 450, w: 220, h: 150 },
                    { x: 650, w: 180, h: 95 }
                ]);

                this.drawSeaweedSilhouettes(this.bgNear, 0x021a63, [
                    { x: 25, y: 545, s: 1.4 },
                    { x: 140, y: 555, s: 1.3 },
                    { x: 330, y: 550, s: 1.2 },
                    { x: 590, y: 548, s: 1.5 },
                    { x: 745, y: 555, s: 1.1 }
                ]);

                // offsets do parallax
                this.parallaxFarX = 0;
                this.parallaxMidX = 0;
                this.parallaxNearX = 0;
            }

            createBackgroundFish() {
                this.time.addEvent({
                    delay: 2600,
                    loop: true,
                    callback: () => {
                        const fish = this.add.ellipse(
                            -30,
                            Phaser.Math.Between(120, 420),
                            24,
                            10,
                            0x0b2230,
                            0.35
                        ).setDepth(-12);

                        this.tweens.add({
                            targets: fish,
                            x: 850,
                            duration: Phaser.Math.Between(7000, 11000),
                            onComplete: () => fish.destroy()
                        });
                    }
                });
            }

            createBubbleSystem() {
                this.bubbleParticles = this.add.particles('bgBubble');
                this.bubbleParticles.setDepth(-10);

                this.bubbleEmitter = this.bubbleParticles.createEmitter({
                    x: { min: 20, max: 780 },
                    y: 590,
                    lifespan: 5000,
                    speedY: { min: -90, max: -40 },
                    speedX: { min: -10, max: 10 },
                    scale: { start: 0.15, end: 0.6 },
                    alpha: { start: 0.0, end: 0.45 },
                    quantity: 1,
                    frequency: 220,
                    blendMode: 'ADD'
                });
            }
            createDecorativeCorals() {
                const leftCoral = this.add.image(40, 530, 'coralPink')
                    .setScale(1.4)
                    .setDepth(-1)
                    .setAlpha(0.95);

                const rightCoral = this.add.image(760, 535, 'coralPink')
                    .setScale(1.2)
                    .setFlipX(true)
                    .setDepth(-1)
                    .setAlpha(0.95);

                this.frontDecor.add(leftCoral);
                this.frontDecor.add(rightCoral);

                for (let i = 0; i < 7; i++) {
                    const seaweed = this.add.image(60 + i * 110, 540, 'seaweed')
                        .setScale(Phaser.Math.FloatBetween(0.7, 1.2))
                        .setDepth(-2)
                        .setAlpha(0.8);

                    this.frontDecor.add(seaweed);

                    this.tweens.add({
                        targets: seaweed,
                        angle: Phaser.Math.Between(-4, 4),
                        duration: Phaser.Math.Between(1400, 2400),
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                }
            }
            createWaterGradient() {
                const g = this.add.graphics();

                // Gradiente manual em faixas
                const steps = 24;
                const topColor = Phaser.Display.Color.ValueToColor(0x244fc7);
                const bottomColor = Phaser.Display.Color.ValueToColor(0x041238);

                for (let i = 0; i < steps; i++) {
                    const t = i / (steps - 1);
                    const c = Phaser.Display.Color.Interpolate.ColorWithColor(
                        topColor,
                        bottomColor,
                        steps - 1,
                        i
                    );

                    const color = Phaser.Display.Color.GetColor(c.r, c.g, c.b);
                    const y = (600 / steps) * i;

                    g.fillStyle(color, 1);
                    g.fillRect(0, y, 800, 600 / steps + 2);
                }

                // leve escurecimento inferior
                g.fillStyle(0x020814, 0.28);
                g.fillRect(0, 430, 800, 170);

                g.setDepth(-30);

                // alguns feixes de luz simples
                this.lightBeams = this.add.graphics().setDepth(-29);
                this.lightBeams.fillStyle(0x9ec5ff, 0.08);

                this.lightBeams.fillTriangle(70, 0, 120, 0, 210, 210);
                this.lightBeams.fillTriangle(110, 0, 150, 0, 230, 150);
                this.lightBeams.fillTriangle(620, 0, 660, 0, 740, 180);
            }

            createOceanAmbience() {
                this.createWaterGradient();
                this.createSandFloor();
                this.createParallaxBackground();
                this.createBubbleSystem();
                this.createBackgroundFish();
            }

            createSandFloor() {
                const g = this.add.graphics();

                // base da areia
                g.fillStyle(0xc2a56c, 1);
                g.fillRect(0, 548, 800, 52);

                // irregularidades
                g.fillStyle(0xd7bb83, 1);
                for (let i = 0; i < 40; i++) {
                    const x = i * 22;
                    const h = Phaser.Math.Between(6, 16);
                    g.fillEllipse(x, 550, 30, h);
                }

                // pontinhos para parecer granulado
                for (let i = 0; i < 180; i++) {
                    g.fillStyle(Phaser.Math.Between(0, 1) ? 0xb9985e : 0xe1c78f, 0.45);
                    g.fillCircle(
                        Phaser.Math.Between(0, 800),
                        Phaser.Math.Between(550, 598),
                        Phaser.Math.Between(1, 2)
                    );
                }

                g.setDepth(-5);
            }

            spawnWave() {
                this.enemyDirection = 1;

                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 11; col++) {

                        const x = 100 + (col * 55);
                        const y = 100 + (row * 60);

                        let alien = this.enemies.create(
                            x,
                            y,
                            `creature${row + 1}`
                        );

                        alien.scoreValue = (5 - row) * 10;

                        alien.setScale(0.5)
                    }
                }

                this.enemySpeed = 30 + (this.wave * 10);
                this.updateEnemyVelocity();

                this.enemyFireTimer.delay = Math.max(200, 1000 - (this.wave * 100));
            }


            updateEnemyVelocity() {
                const count = this.enemies.countActive();
                const speedMult = 1 + (55 - count) / 55;
                this.enemies.setVelocityX(this.enemySpeed * this.enemyDirection * speedMult);
            }

            update(time) {
                this.updateParallaxBackground();

                if (this.cursors.left.isDown) this.player.setVelocityX(-300);
                else if (this.cursors.right.isDown) this.player.setVelocityX(300);
                else this.player.setVelocityX(0);

                if ((this.fireKey.isDown || this.input.activePointer.isDown) && time > this.lastFired) {
                    this.fireBullet();
                    this.lastFired = time + 400;
                }

                let drop = false;
                this.enemies.getChildren().forEach(e => {
                    if ((e.x > 780 && this.enemyDirection > 0) || (e.x < 20 && this.enemyDirection < 0)) drop = true;
                });

                if (drop) {
                    this.enemyDirection *= -1;
                    this.enemies.getChildren().forEach(e => e.y += 15);
                    this.updateEnemyVelocity();
                }
            }

            fireBullet() {
                this.playerBullets.create(this.player.x, this.player.y - 15, 'bubble').setVelocityY(-450);
            }

            enemyFire() {
                const aliens = this.enemies.getChildren().filter(a => a.active);
                if (aliens.length === 0) return;
                const shooter = Phaser.Utils.Array.GetRandom(aliens);
                this.enemyBullets.create(shooter.x, shooter.y, 'enemy_shot').setVelocityY(250 + (this.wave * 20));
            }

            hitEnemy(bullet, enemy) {
                bullet.destroy();
                this.explosionEmitter.explode(10, enemy.x, enemy.y);
                this.score += enemy.scoreValue;
                this.scoreText.setText('SCORE: ' + this.score);
                enemy.destroy();
                this.updateEnemyVelocity();
                if (this.enemies.countActive() === 0) {
                    this.wave++;
                    this.time.delayedCall(1000, () => this.spawnWave());
                }
            }
            hitPlayer(player, bullet) {
                bullet.destroy();
                this.lives--;

                // efeito no último coração
                const heart = this.hearts[this.hearts.length - 1];

                if (heart) {
                    this.tweens.add({
                        targets: heart,
                        scale: 1.5,
                        alpha: 0,
                        duration: 200,
                        ease: 'Back.easeIn',
                        onComplete: () => heart.destroy()
                    });
                }

                this.hearts.pop();

                this.cameras.main.shake(100, 0.01);

                if (this.lives <= 0) {
                    this.scene.start('GameOver', { score: this.score });
                }
            }

            hitBarrier(bullet, barrier) {
                bullet.destroy();
                barrier.health--;
                barrier.setAlpha(barrier.health / 5);
                if (barrier.health <= 0) barrier.destroy();
            }
        }

        class GameOver extends Phaser.Scene {
            constructor() { super('GameOver'); }
            create(data) {
                this.add.text(400, 250, 'FIM DA MISSÃO', { fontSize: '50px', fill: '#ff0000' }).setOrigin(0.5);
                this.add.text(400, 320, `SCORE: ${data.score}`, { fontSize: '24px', fill: '#fff' }).setOrigin(0.5);
                this.add.text(400, 450, '[ CLIQUE PARA RECOMEÇAR ]', { fontSize: '20px', fill: '#00ffcc' }).setOrigin(0.5);
                this.input.once('pointerdown', () => this.scene.start('GameScene'));
            }
        }

        new Phaser.Game({
            type: Phaser.AUTO, width: 800, height: 600,
            parent: 'game-container',
            physics: { default: 'arcade' },
            scene: [BootScene, MainMenu, GameScene, GameOver]
        });
    </script>
</body>
